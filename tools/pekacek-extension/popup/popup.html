<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      background: #1a1a2e;
      color: #eee;
      font-family: "Cascadia Code", "Consolas", monospace;
      text-align: center;
    }
    #avatar {
      font-size: 14px;
      line-height: 1.3;
      white-space: pre;
      color: #4ecca3;
      margin-bottom: 12px;
    }
    h3 {
      font-size: 13px;
      margin: 0 0 12px;
      font-family: "Segoe UI", sans-serif;
      color: #ffd369;
    }
    button {
      display: block;
      width: 100%;
      padding: 8px;
      margin: 6px 0;
      border: 1px solid #555;
      border-radius: 6px;
      background: #16213e;
      color: #eee;
      font-size: 12px;
      font-family: "Segoe UI", sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #0f3460;
      border-color: #4ecca3;
    }
    .version {
      font-size: 10px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div id="avatar">  ( o_o)/
  /|___|
   / \</div>
  <h3>Pekacek v2.0</h3>
  <button id="open-sidebar">Otevrit sidebar</button>
  <button id="open-options">Nastaveni</button>
  <div class="version">Reading Companion Beta</div>
  <script src="popup.js"></script>
</body>
</html>
